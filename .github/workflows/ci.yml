name: CI

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install ".[dev]"

      - name: Audit Python dependencies
        run: pip-audit

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Mypy
        run: mypy backend

      - name: Pytest
        run: pytest --cov=backend --cov-report=term-missing

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Prettier
        working-directory: frontend
        run: npm run format:check

      - name: TypeScript
        working-directory: frontend
        run: npm run typecheck

      - name: Vitest
        working-directory: frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  container:
    name: Build container
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image without pushing
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: crowdarr:ci

      - name: Smoke-test container health
        shell: bash
        run: |
          set -euo pipefail
          trap 'docker rm --force crowdarr-ci >/dev/null 2>&1 || true' EXIT
          # A legacy-only override proves existing direct `docker run` deployments
          # are not shadowed by corrected-prefix image defaults.
          docker run --detach --name crowdarr-ci \
            --env CROWDARRR_PORT=8123 crowdarr:ci
          for attempt in {1..30}; do
            status="$(docker inspect --format '{{.State.Health.Status}}' crowdarr-ci)"
            if [[ "$status" == "healthy" ]]; then
              exit 0
            fi
            if [[ "$status" == "unhealthy" ]]; then
              docker logs crowdarr-ci
              exit 1
            fi
            echo "Waiting for container health ($attempt/30): $status"
            sleep 2
          done
          docker logs crowdarr-ci
          exit 1
