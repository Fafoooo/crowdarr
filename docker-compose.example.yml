name: crowdarr

services:
  crowdarr:
    image: ${CROWDARR_IMAGE:-${CROWDARRR_IMAGE:-crowdarr:local}}
    build:
      context: .
    container_name: crowdarr
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      UMASK: ${UMASK:-0022}
      TZ: ${TZ:-Etc/UTC}
      CROWDARR_HOST: 0.0.0.0
      CROWDARR_PORT: ${CROWDARR_PORT:-${CROWDARRR_PORT:-8000}}
      CROWDARR_DATA_DIR: /config
      CROWDARR_LOG_LEVEL: ${CROWDARR_LOG_LEVEL:-${CROWDARRR_LOG_LEVEL:-info}}
      CROWDARR_API_TOKEN: ${CROWDARR_API_TOKEN:-${CROWDARRR_API_TOKEN:-}}
      CROWDARR_MASTER_KEY: ${CROWDARR_MASTER_KEY:-${CROWDARRR_MASTER_KEY:-}}
      CROWDARR_SAB_WEBHOOK_SECRET: ${CROWDARR_SAB_WEBHOOK_SECRET:-${CROWDARRR_SAB_WEBHOOK_SECRET:-}}
      CROWDARR_SAB_WEBHOOK_MAX_BYTES: ${CROWDARR_SAB_WEBHOOK_MAX_BYTES:-${CROWDARRR_SAB_WEBHOOK_MAX_BYTES:-65536}}
      CROWDARR_ACTION_MAX_CONCURRENCY: ${CROWDARR_ACTION_MAX_CONCURRENCY:-${CROWDARRR_ACTION_MAX_CONCURRENCY:-2}}
      CROWDARR_ACTION_MAX_PENDING: ${CROWDARR_ACTION_MAX_PENDING:-${CROWDARRR_ACTION_MAX_PENDING:-64}}
      CROWDARR_HASH_MAX_CONCURRENCY: ${CROWDARR_HASH_MAX_CONCURRENCY:-${CROWDARRR_HASH_MAX_CONCURRENCY:-2}}
      CROWDARR_QBIT_POLL_INTERVAL_SECONDS: ${CROWDARR_QBIT_POLL_INTERVAL_SECONDS:-${CROWDARRR_QBIT_POLL_INTERVAL_SECONDS:-30}}
      CROWDARR_HEALTHCHECK_TIMEOUT_SECONDS: ${CROWDARR_HEALTHCHECK_TIMEOUT_SECONDS:-${CROWDARRR_HEALTHCHECK_TIMEOUT_SECONDS:-5}}
      CROWDARR_RECHECK_TIMEOUT_SECONDS: ${CROWDARR_RECHECK_TIMEOUT_SECONDS:-${CROWDARRR_RECHECK_TIMEOUT_SECONDS:-1800}}
    ports:
      - "${CROWDARR_PORT:-${CROWDARRR_PORT:-8000}}:${CROWDARR_PORT:-${CROWDARRR_PORT:-8000}}"
    volumes:
      - "${CROWDARR_CONFIG_ROOT:-${CROWDARRR_CONFIG_ROOT:-./config}}:/config"
      - "${MEDIA_ROOT:-./media}:/data"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
