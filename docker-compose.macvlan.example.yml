name: crowdarrr-macvlan-example

# Opt-in profile for the documented 10.10.3.0/24 reference installation.
# Create the external `media` macvlan first and choose an unused address below.
services:
  crowdarrr:
    image: ${CROWDARRR_IMAGE:-crowdarrr:local}
    build:
      context: .
    container_name: crowdarrr
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      UMASK: ${UMASK:-0022}
      TZ: ${TZ:-Etc/UTC}
      CROWDARRR_HOST: 0.0.0.0
      CROWDARRR_PORT: ${CROWDARRR_PORT:-8000}
      CROWDARRR_DATA_DIR: /config
      CROWDARRR_LOG_LEVEL: ${CROWDARRR_LOG_LEVEL:-info}
      CROWDARRR_API_TOKEN: ${CROWDARRR_API_TOKEN:-}
      CROWDARRR_MASTER_KEY: ${CROWDARRR_MASTER_KEY:-}
      CROWDARRR_SAB_WEBHOOK_SECRET: ${CROWDARRR_SAB_WEBHOOK_SECRET:-}
      CROWDARRR_SAB_WEBHOOK_MAX_BYTES: ${CROWDARRR_SAB_WEBHOOK_MAX_BYTES:-65536}
      CROWDARRR_ACTION_MAX_CONCURRENCY: ${CROWDARRR_ACTION_MAX_CONCURRENCY:-2}
      CROWDARRR_ACTION_MAX_PENDING: ${CROWDARRR_ACTION_MAX_PENDING:-64}
      CROWDARRR_HASH_MAX_CONCURRENCY: ${CROWDARRR_HASH_MAX_CONCURRENCY:-2}
      CROWDARRR_QBIT_POLL_INTERVAL_SECONDS: ${CROWDARRR_QBIT_POLL_INTERVAL_SECONDS:-30}
      CROWDARRR_HEALTHCHECK_TIMEOUT_SECONDS: ${CROWDARRR_HEALTHCHECK_TIMEOUT_SECONDS:-5}
    volumes:
      - "./config:/config"
      - "/home/ubuntu/media:/data"
    networks:
      media:
        ipv4_address: ${CROWDARRR_MACVLAN_IP:?Set an unused 10.10.3.x address}
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s

networks:
  media:
    external: true
    name: media
